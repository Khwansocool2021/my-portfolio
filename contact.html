<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Contact | Khwan.dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(180deg, #e0f2f1 0%, #81d4fa 50%, #0288d1 100%); background-size: 100% 200%; animation: waveMove 10s ease-in-out infinite; }
        .dark body { background: linear-gradient(180deg, #020617 0%, #1e293b 50%, #0f172a 100%); }
        @keyframes waveMove { 0%, 100% { background-position: 0% 0%; } 50% { background-position: 0% 100%; } }
        .outer-glow { position: relative; background: linear-gradient(45deg, #38bdf8, #818cf8, #22d3ee, #38bdf8); background-size: 300%; padding: 8px; border-radius: 3.2rem; animation: border-rotate 6s linear infinite; }
        @keyframes border-rotate { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .content-box { background: #ffffff; border-radius: 2.8rem; width: 100%; padding: 3rem; }
        .dark .content-box { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="text-gray-900 dark:text-gray-100 transition-colors duration-500 min-h-screen flex flex-col justify-center items-center p-6">

    <div class="outer-glow w-full max-w-lg">
        <section class="content-box shadow-2xl text-center">
            <h1 class="text-4xl font-black mb-8 tracking-tighter">ติดต่อฉัน</h1>
            
            <form action="https://formspree.io/f/mlgqjlww" method="POST" class="space-y-4 text-left">
                <input type="text" name="name" placeholder="ชื่อของคุณ" required class="w-full p-4 rounded-2xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 outline-none focus:border-blue-500">
                <input type="email" name="email" placeholder="อีเมลของคุณ" required class="w-full p-4 rounded-2xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 outline-none focus:border-blue-500">
                <textarea name="message" placeholder="ข้อความของคุณ" rows="4" required class="w-full p-4 rounded-2xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 outline-none focus:border-blue-500"></textarea>
                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-full transition-all shadow-lg hover:scale-[1.02]">ส่งข้อความ</button>
            </form>

            <div class="mt-8 pt-8 border-t border-black/10 dark:border-white/10">
                <p class="text-sm text-gray-500 mb-4">หรือติดต่อฉันผ่าน:</p>
                <div class="flex justify-center gap-6 text-3xl">
                    <a href="https://www.facebook.com/Khwan2021?locale=th_TH" target="_blank" class="text-blue-600 hover:scale-110 transition-transform"><i class="fab fa-facebook"></i></a>
                    <a href="https://line.me/ti/p/ENIVzgDksv" target="_blank" class="text-green-500 hover:scale-110 transition-transform"><i class="fab fa-line"></i></a>
                    <a href="https://www.instagram.com/khwan_2024?igsh=MXU2bG9yZHpkaTE2bw==" target="_blank" class="text-pink-600 hover:scale-110 transition-transform"><i class="fab fa-instagram"></i></a>
                    <a href="https://wa.me/qr/XBX5KLAHR3BCA1" target="_blank" class="text-emerald-500 hover:scale-110 transition-transform"><i class="fab fa-whatsapp"></i></a>
                </div>
                <div class="mt-8">
                    <a href="index.html" class="text-blue-500 hover:underline transition-all">← กลับไปที่หน้าแรก</a>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
